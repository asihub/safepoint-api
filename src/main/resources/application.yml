server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/safepoint
    username: ${DB_USER:safepoint}
    password: ${DB_PASSWORD:safepoint}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Internal ML service URL — not exposed to public
ml:
  service:
    url: ${ML_SERVICE_URL:http://127.0.0.1:8001}
    timeout-ms: 10000

# SAMHSA Treatment Locator API
samhsa:
  api:
    url: https://findtreatment.samhsa.gov/locator/row
    key: ${SAMHSA_API_KEY:}

# Swagger UI — disable in production
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.safepoint: INFO
    org.springframework.web: WARN
